<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Dashboard — HireMeNow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="./client-dashboard.css">
  <script src="../assets/js/theme.js"></script>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-logo">HireMeNow</a>
  <div class="nav-right" id="nav-right">
    <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme"></button>
  </div>
</nav>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-profile">
      <div class="sidebar-avatar" id="sidebar-avatar"></div>
      <div class="sidebar-name" id="sidebar-name"></div>
      <div class="sidebar-role">Client</div>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-nav-btn active" data-tab="my-jobs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
        My Jobs
      </button>
      <button class="sidebar-nav-btn" data-tab="post-job">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Post a Job
      </button>
      <button class="sidebar-nav-btn" data-tab="reviews">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Reviews Written
      </button>
      <a href="./jobs.html" class="sidebar-nav-btn" style="text-decoration:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Browse Jobs
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="sidebar-nav-btn" id="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="tab-panel active" id="tab-my-jobs"></div>
    <div class="tab-panel" id="tab-post-job"></div>
    <div class="tab-panel" id="tab-reviews"></div>
  </main>
</div>

<div id="applicants-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-title" id="applicants-modal-title">Applicants</div>
    <div class="modal-subtitle" id="applicants-modal-subtitle"></div>
    <div class="applicant-sort-row">
      <span class="sort-label">Sort by</span>
      <button class="btn-sort active" data-sort="score">Quiz Score</button>
      <button class="btn-sort" data-sort="rating">Rating</button>
    </div>
    <div class="applicants-list" id="applicants-list"></div>
    <button class="modal-close-btn" id="applicants-close-btn">Close</button>
  </div>
</div>

<div id="review-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">Review Freelancer</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px;" id="review-modal-subtitle"></p>
    <div class="star-rating" id="star-rating">
      <button class="star-btn" data-star="1">⭐</button>
      <button class="star-btn" data-star="2">⭐</button>
      <button class="star-btn" data-star="3">⭐</button>
      <button class="star-btn" data-star="4">⭐</button>
      <button class="star-btn" data-star="5">⭐</button>
    </div>
    <textarea class="modal-textarea" id="review-text" placeholder="Describe your experience with this freelancer..."></textarea>
    <div class="modal-actions">
      <button class="btn-modal-submit" id="review-submit-btn">Submit Review</button>
      <button class="btn-modal-cancel" id="review-cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="../assets/js/store.js"></script>
<script src="./client-dashboard.js"></script>
</body>
</html>
