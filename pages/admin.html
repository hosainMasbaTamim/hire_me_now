<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — HireMeNow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="./admin.css">
  <script src="../assets/js/theme.js"></script>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-logo">HireMeNow</a>
  <span class="nav-badge">Admin</span>
  <div class="nav-right">
    <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme"></button>
    <button class="nav-link" id="logout-nav-btn">Sign Out</button>
  </div>
</nav>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-label">Control Panel</div>
      <div class="sidebar-header-title">Super Admin</div>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-nav-btn active" data-tab="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Overview
      </button>
      <button class="sidebar-nav-btn" data-tab="skills">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Skill Management
      </button>
      <button class="sidebar-nav-btn" data-tab="users">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        User Moderation
      </button>
      <button class="sidebar-nav-btn" data-tab="jobs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
        Job Moderation
      </button>
    </nav>
    <div class="sidebar-bottom">
      <button class="sidebar-nav-btn" id="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="tab-panel active" id="tab-overview"></div>
    <div class="tab-panel" id="tab-skills"></div>
    <div class="tab-panel" id="tab-users"></div>
    <div class="tab-panel" id="tab-jobs"></div>
  </main>
</div>

<div class="toast" id="toast"></div>
<script src="../assets/js/store.js"></script>
<script src="./admin.js"></script>
</body>
</html>
