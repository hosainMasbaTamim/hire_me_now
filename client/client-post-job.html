<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post a Job — HireMeNow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="./client-post-job.css" />
</head>

<body>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo">HireMeNow</a>
    <div class="nav-right">
      <div style="font-size: 12px; font-weight: 600; color: var(--text)">
        TechCorp
      </div>
      <div class="nav-avatar">T</div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-profile">
        <div class="sidebar-avatar">T</div>
        <div class="sidebar-name">TechCorp</div>
        <div class="sidebar-role">Client</div>
      </div>
      <nav class="sidebar-nav">
        <a href="./client-dashboard.html" class="sidebar-nav-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" />
          </svg>
          My Jobs
        </a>
        <a href="./client-post-job.html" class="sidebar-nav-btn active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="16" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
          Post a Job
        </a>
        <a href="./applicants.html" class="sidebar-nav-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
            <circle cx="8.5" cy="7" r="4" />
            <path d="M20 8v6M23 11h-6" />
          </svg>
          Applicants
        </a>
        <a href="./client-reviews.html" class="sidebar-nav-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
          Reviews Written
        </a>
        <a href="../pages/freelancers.html" class="sidebar-nav-btn" style="text-decoration: none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          Browse Freelancers
        </a>
      </nav>
      <div class="sidebar-bottom">
        <a href="../index.html" class="sidebar-nav-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sign Out
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="section-title">Post a New Job</div>
      <div class="post-job-form">
        <div class="form-group">
          <label class="form-label" for="pj-title">Job Title</label>
          <input class="form-input" type="text" id="pj-title" placeholder="e.g. React Developer for E-commerce App" />
          <span class="form-error-msg" id="pj-title-err">Title is required.</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="pj-desc">Description</label>
          <textarea class="form-textarea" id="pj-desc"
            placeholder="Describe the project, deliverables, and requirements..."></textarea>
          <span class="form-error-msg" id="pj-desc-err">Description is required.</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="pj-skill">Required Skill</label>
          <select class="form-select" id="pj-skill">
            <option value="">— Select a skill —</option>
            <option value="html-css">HTML & CSS</option>
            <option value="javascript">JavaScript</option>
            <option value="react">React</option>
            <option value="nodejs">Node.js</option>
            <option value="python">Python</option>
          </select>
          <span class="form-error-msg" id="pj-skill-err">Please select a required skill.</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="pj-budget">Budget</label>
          <input class="form-input" type="text" id="pj-budget" placeholder="e.g. $500 or $50/hr" />
          <span class="form-error-msg" id="pj-budget-err">Budget is required.</span>
        </div>
        <button class="btn-post-job" id="pj-submit">Post Job →</button>
      </div>
    </main>
  </div>
</body>

</html>
